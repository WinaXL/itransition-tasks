services:
  - type: web
    name: cvforge
    runtime: node
    plan: free
    rootDir: Project
    # --include=dev: Prisma / TypeScript / Vite live in (or via) packages that
    # Render would skip when NODE_ENV=production during a plain npm install.
    buildCommand: npm install --include=dev && npm run build && npm run db:push
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cvforge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

databases:
  - name: cvforge-db
    plan: free
