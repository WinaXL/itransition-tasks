# Render Blueprint — deploys the WebSocket game server.
# Import this repo at https://dashboard.render.com (New + → Blueprint),
# or configure the same values manually when creating a Web Service.
services:
  - type: web
    name: naval-strike-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to your Vercel URL after the frontend is deployed
      # (comma-separated values are allowed, e.g. prod + preview domains).
      - key: CLIENT_ORIGIN
        sync: false
